name: realtime-dex-activity-terminal

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rdat}
      POSTGRES_USER: ${POSTGRES_USER:-rdat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rdat_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "${REDIS_MAXMEMORY:-256mb}",
        "--maxmemory-policy",
        "noeviction"
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: 4000
      WS_HEARTBEAT_INTERVAL_MS: ${WS_HEARTBEAT_INTERVAL_MS:-30000}
      WS_MAX_CLIENTS: ${WS_MAX_CLIENTS:-200}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-development-only-secret-change-before-production}
      AUTH_SESSION_TTL_SECONDS: ${AUTH_SESSION_TTL_SECONDS:-604800}
      AUTH_NONCE_TTL_SECONDS: ${AUTH_NONCE_TTL_SECONDS:-300}
      DATABASE_URL: postgres://${POSTGRES_USER:-rdat}:${POSTGRES_PASSWORD:-rdat_dev_password}@postgres:5432/${POSTGRES_DB:-rdat}
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health | grep '\"ok\":true'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgres://${POSTGRES_USER:-rdat}:${POSTGRES_PASSWORD:-rdat_dev_password}@postgres:5432/${POSTGRES_DB:-rdat}
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      INGESTION_ENABLED: ${INGESTION_ENABLED:-false}
      BASE_SEPOLIA_RPC_HTTP_URL: ${BASE_SEPOLIA_RPC_HTTP_URL:-https://sepolia.base.org}
      BASE_SEPOLIA_RPC_WS_URL: ${BASE_SEPOLIA_RPC_WS_URL:-}
      INGESTION_POLLING_INTERVAL_MS: ${INGESTION_POLLING_INTERVAL_MS:-2000}
      INGESTION_DEDUP_TTL_SECONDS: ${INGESTION_DEDUP_TTL_SECONDS:-86400}
      WHALE_ALERT_THRESHOLD_USD: ${WHALE_ALERT_THRESHOLD_USD:-25000}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-30}
      CLEANUP_INTERVAL_MS: ${CLEANUP_INTERVAL_MS:-3600000}
      MONITORED_POOLS: ${MONITORED_POOLS:-[]}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      api:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
